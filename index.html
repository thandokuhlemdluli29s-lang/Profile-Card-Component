<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Profile card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <img class="top-background" src="./images/bg-pattern-top.svg" alt="Top Background Image">
  <img class="top-background" src="./images/bg-pattern-bottom.svg" alt="Bottom Background Image">
  <div class="card">
    <div class="bubble-section">
      <img class="profile-img" src="" alt="">
    </div>

    <div class="profile-info-container">
      <div class="profile-info">
        <p>
          Victor Crest <span>26</span>
        </p>
        <p>London</p>
      </div>

      <div class="profile-rates">
        <div class="description-number">
          <strong>80K</strong>
          <p>Followers</p>
        </div>

        <div class="description-number">
          <strong>803K</strong>
          <p>Likes</p>
        </div>

        <div class="description-number">
          <strong>1.4K</strong>
          <p>Photos</p>
        </div>
      </div>
    </div>
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Thandokuhle</a>.
  </footer>
</body>
</html>

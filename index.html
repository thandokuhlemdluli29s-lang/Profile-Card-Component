<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Profile card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
  <link rel="stylesheet" href="./styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">
</head>
<body>
  <div class="outer-container">
    <div class="card">
      <div class="bubble-section">
        <img class="bubble-img" src="./images/bg-pattern-card.svg" alt="Bubble Pattern">
        <img class="profile-img" src="./images/image-victor.jpg" alt="Profile Picture of the User">
      </div>

      <div class="profile-info-container">
        <div class="profile-info">
          <h1>
              Victor Crest <span>26</span>
          </h1>
          <p>London</p>
        </div>

        <div class="profile-rates">
          <div class="description-number">
            <strong>80K</strong>
            <p>Followers</p>
          </div>

          <div class="description-number">
            <strong>803K</strong>
            <p>Likes</p>
          </div>

          <div class="description-number">
            <strong>1.4K</strong>
            <p>Photos</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Thandokuhle</a>.
  </footer>
</body>
</html>
